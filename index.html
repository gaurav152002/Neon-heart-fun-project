<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Kunjizzz</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(-45deg,#000,#140016,#000,#1a0020);
  background-size:400% 400%;
  animation:bgMove 20s linear infinite; /* Slower for smoothness */
  font-family:'Segoe UI',sans-serif;
  position:relative;
}

/* Smooth background */
@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ---------------- TEXT ---------------- */

.message{
  position:absolute;
  top:6%;
  font-size:5vmin;
  font-weight:800;
  letter-spacing:6px;
  color:#ff2ebd;
  opacity:0;
  text-shadow:0 0 15px #ff2ebd; /* Reduced glow */
  animation:showText 2s ease forwards;
  animation-delay:0.5s; /* Text first */
  z-index:2;
}

@keyframes showText{
  to{
    opacity:1;
    transform:translateY(-8px);
  }
}

/* ---------------- HEART ---------------- */

.heart-loader{
  width:60vmin;
  height:60vmin;
}

.heart-loader__group{
  transform-origin:0 90px;
  animation:group-anim 7s 2.5s infinite; /* delayed */
}

.heart-loader__heartPath{
  stroke:#ff2ebd;
  stroke-width:4;
  fill:transparent;
  stroke-dasharray:308.522;
  stroke-dashoffset:308.522;
  filter:drop-shadow(0 0 15px #ff2ebd); /* Reduced shadow */
  animation:heart-anim 7s 2.5s infinite;
  will-change:transform;
}

/* Animations */

@keyframes group-anim{
  43%{transform:rotate(0);}
  54%{transform:rotate(-45deg);}
  90%{opacity:1;}
  97%{opacity:0;}
  100%{opacity:0;}
}

@keyframes heart-anim{
  55%{stroke-dashoffset:308.522;fill:transparent;}
  70%{stroke-dashoffset:0;}
  87%{fill:#ff2ebd;}
  100%{fill:#ff2ebd;}
}

/* ---------------- STAR SHOWER ---------------- */

.star{
  position:absolute;
  width:2px;
  height:14px;
  background:linear-gradient(transparent,#ff2ebd);
  opacity:0;
  animation:fall linear forwards;
  pointer-events:none;
  will-change:transform;
}

@keyframes fall{
  0%{transform:translateY(-100vh);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(100vh);opacity:0;}
}

</style>
</head>

<body>

<div class="message">For My Kunjizzz</div>

<svg class="heart-loader" viewBox="0 0 90 90">
  <g class="heart-loader__group">
    <path class="heart-loader__heartPath"
      d="M60,30 a30,30 0 0,1 0,60 L0,90 0,30 a30,30 0 0,1 60,0" />
  </g>
</svg>

<script>

/* Optimized star shower (reduced density for smooth FPS) */
function createStar(){
  const star=document.createElement("div");
  star.classList.add("star");
  star.style.left=Math.random()*window.innerWidth+"px";
  star.style.animationDuration=(Math.random()*2+2)+"s";
  document.body.appendChild(star);
  setTimeout(()=>star.remove(),4000);
}

/* Reduced frequency for mobile smoothness */
setInterval(createStar,120);

</script>

</body>
</html>
