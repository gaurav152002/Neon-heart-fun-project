<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candle Fun</title>
  <style>
    /* General Styling */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #FFF;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      transition: background 0.5s;
    }

    /* Welcome Screen Styling */
    #welcome-screen {
      text-align: center;
      z-index: 100;
    }

    h1 {
      color: #673C63;
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    .btn {
      padding: 15px 30px;
      background-color: #673C63;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      background-color: #4a2b47;
    }

    /* Animation Container (Hidden by default) */
    #animation-container {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .instruction-text {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      color: #673C63;
      font-weight: bold;
      text-align: center;
      pointer-events: none;
    }

    /* --- ORIGINAL CANDLE CSS --- */
    .body-bg-active {
      animation: change-background 3s infinite linear;
    }

    .wrapper {
      position: absolute;
      left: 50%;
      top: 70%;
      transform: scale(1.5, 1.5) translate(-50%, -50%);
    }

    .floor {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 350px;
      height: 5px;
      background: #673C63;
      transform: translate(-50%, -50%);
      box-shadow: 0px 2px 5px #111;
      z-index: 2;
    }

    .candles {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 250px;
      height: 150px;
      transform: translate(-50%, -100%);
      z-index: 1;
    }

    .candle1 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 35px;
      height: 100px;
      background: #fff;
      border: 3px solid #673C63;
      border-bottom: 0px;
      border-radius: 3px;
      transform-origin: center right;
      transform: translate(60%, -25%);
      box-shadow: -2px 0px 0px #95c6f2 inset;
      animation: expand-body 3s infinite linear;
    }

    .candle1__stick, .candle2__stick {
      position: absolute;
      left: 50%;
      top: 0%;
      width: 3px;
      height: 15px;
      background: #673C63;
      border-radius: 8px;
      transform: translate(-50%, -100%);
    }

    .candle2__stick {
      height: 12px;
      transform-origin: bottom center;
      animation: stick-animation 3s infinite linear;
    }

    .candle1__eyes-one, .candle1__eyes-two {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 100%;
      background: #673C63;
      top: 20%;
      animation: blink-eyes 3s infinite linear;
    }
    .candle1__eyes-one { left: 30%; transform: translate(-70%, 0%); }
    .candle1__eyes-two { left: 70%; transform: translate(-70%, 0%); }

    .candle1__mouth {
      position: absolute;
      left: 40%;
      top: 20%;
      width: 0px;
      height: 0px;
      border-radius: 20px;
      background: #673C63;
      transform: translate(-50%, -50%);
      animation: uff 3s infinite linear;
    }

    .candle__smoke-one {
      position: absolute;
      left: 30%;
      top: 50%;
      width: 30px;
      height: 3px;
      background: grey;
      transform: translate(-50%, -50%);
      animation: move-left 3s infinite linear;
    }

    .candle__smoke-two {
      position: absolute;
      left: 30%;
      top: 40%;
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: grey;
      transform: translate(-50%, -50%);
      animation: move-top 3s infinite linear;
    }

    .candle2 {
      position: absolute;
      left: 20%;
      top: 65%;
      width: 42px;
      height: 60px;
      background: #fff;
      border: 3px solid #673C63;
      border-bottom: 0px;
      border-radius: 3px;
      transform: translate(60%, -15%);
      transform-origin: center right;
      box-shadow: -2px 0px 0px #95c6f2 inset;
      animation: shake-left 3s infinite linear;
    }

    .candle2__eyes-one, .candle2__eyes-two {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #673C63;
      top: 50%;
    }
    .candle2__eyes-one { left: 30%; animation: changeto-lower 3s infinite linear; }
    .candle2__eyes-two { left: 70%; animation: changeto-greater 3s infinite linear; }

    .light__wave {
      position: absolute;
      top: 35%;
      left: 35%;
      width: 75px;
      height: 75px;
      border-radius: 100%;
      z-index: 0;
      transform: translate(-25%, -50%) scale(2.5, 2.5);
      border: 2px solid rgba(255, 255, 255, 0.2);
      animation: expand-light 3s infinite linear;
    }

    .candle2__fire {
      position: absolute;
      top: 50%;
      left: 40%;
      display: block;
      width: 16px;
      height: 20px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: #FF9800;
      transform: translate(-50%, -50%);
      animation: dance-fire 3s infinite linear;
      cursor: pointer;
    }

    /* Keyframes (Kept from your original) */
    @keyframes blink-eyes { 0%,35% { opacity: 1; } 36%,39% { opacity: 0; } 40% { opacity: 1; } 50%,65% { transform: translate(-140%, 0%); } 66% { transform: translate(-70%, 0%); } }
    @keyframes expand-body { 0%,40% { transform: scale(1, 1) translate(60%, -25%); } 45%,55% { transform: scale(1.1, 1.1) translate(60%, -28%); } 60% { transform: scale(0.89, 0.89) translate(60%, -25%); } 65%, 75% { transform: scale(1, 1) translate(60%, -25%); } }
    @keyframes uff { 0%,40% { width: 0px; height: 0px; } 50%,54% { width: 15px; height: 15px; left: 30%; } 59% { width: 5px; height: 5px; left: 20%; } 67% { width: 0px; height: 0px; left: 30%; } }
    @keyframes change-background { 0%,59%,98%,100% { background: #FFF; } 61%,97% { background: #000; } }
    @keyframes move-left { 0%,59%,100% { width: 0px; left: 40%; } 60% { width: 30px; left: 30%; } 68% { width: 0px; left: 20%; } }
    @keyframes move-top { 0%,64%,100% { width: 0px; height: 0px; top: 0%; } 65% { width: 10px; height: 10px; top: 40%; left: 40%; } 80% { width: 0px; height: 0px; top: 20%; } }
    @keyframes expand-light { 10%,29%,59%,89% { transform: translate(-25%, -50%) scale(0, 0); border: 2px solid rgba(255, 255, 255, 0); } 90%,20%,50% { transform: translate(-25%, -50%) scale(1, 1); } 95%,27%,57% { transform: translate(-25%, -50%) scale(2, 2); border: 2px solid rgba(255, 255, 255, 0.5); } 0%,28%,58%,100% { transform: translate(-25%, -50%) scale(2.5, 2.5); border: 2px solid rgba(255, 255, 255, 0.2); } }
    @keyframes dance-fire { 59%,89% { left: 40%; width: 0px; height: 0px; } 90%,0%,7%,15%,23%,31%,39%,47%,55% { left: 40.8%; width: 16px; height: 20px; background: #FFC107; } 94%,3%,11%,19%,27%,35%,43%,51%,58% { left: 41.2%; width: 16px; height: 20px; background: #FF9800; } }
    @keyframes shake-left { 0%,59% { left: 20%; transform: translate(60%, -15%); } 62% { left: 18%; } 65% { left: 21%; } 67% { left: 20%; } 75% { transform: scale(1.15, 0.85) translate(60%, -15%); background: #fff; } 91% { transform: scale(1.18, 0.82) translate(60%, -10%); background: #F44336; border-color: #F44336; } 97% { transform: scale(1, 1) translate(60%, -15%); } }
    @keyframes changeto-lower { 0%,70%,90% { border-radius: 100%; background: #673C63; transform: translate(-90%, 0%); } 71%,89% { background: none; border: solid #673C63; border-width: 0 2px 2px 0; padding: 1px; transform: rotate(-45deg) translate(-50%, -65%); } }
    @keyframes changeto-greater { 0%,70%,90% { top: 50%; border-radius: 100%; background: #673C63; transform: translate(-80%, 0%); } 71%,89% { top: 30%; background: none; border: solid #673C63; border-width: 0 2px 2px 0; padding: 1px; transform: rotate(135deg) translate(-80%, 20%); } }
    @keyframes stick-animation { 0%,59% { transform: translate(-50%, -100%); } 62% { transform: rotateZ(-15deg) translate(-50%, -100%); } 65% { transform: rotateZ(15deg) translate(-50%, -100%); } 70% { transform: rotateZ(-5deg) translate(-50%, -100%); } 85% { transform: rotateZ(180deg) translate(0%, 120%); } 92% { transform: translate(-50%, -100%); } }
  </style>
</head>
<body id="main-body">

  <div id="welcome-screen">
    <h1>officeil pani onum ile moneiiiii??</h1>
    <button class="btn" onclick="startAnimation()">Onu njeki nokuuu</button>
  </div>

  <div id="animation-container">
    <div class="instruction-text">
      <p>Now, click on the flame! 🔥</p>
    </div>
    
    <div class="wrapper">
      <div class="candles">
        <div class="light__wave"></div>
        <div class="candle1">
          <div class="candle1__body">
            <div class="candle1__eyes">
              <span class="candle1__eyes-one"></span>
              <span class="candle1__eyes-two"></span>
            </div>
            <div class="candle1__mouth"></div>
          </div>
          <div class="candle1__stick"></div>
        </div>
        
        <div class="candle2">
          <div class="candle2__body">
            <div class="candle2__eyes">
              <div class="candle2__eyes-one"></div>
              <div class="candle2__eyes-two"></div>
            </div>
          </div>
          <div class="candle2__stick"></div>
        </div>
        
        <div class="candle2__fire" onclick="toggleBackground()"></div>
        
        <div class="candle__smoke-one"></div>
        <div class="candle__smoke-two"></div>
      </div>
      <div class="floor"></div>
    </div>
  </div>

  <script>
    function startAnimation() {
      // Hide welcome screen
      document.getElementById('welcome-screen').style.display = 'none';
      // Show animation
      document.getElementById('animation-container').style.display = 'block';
      // Start background animation
      document.getElementById('main-body').classList.add('body-bg-active');
    }

    function toggleBackground() {
      const body = document.getElementById('main-body');
      if (body.classList.contains('body-bg-active')) {
        body.classList.remove('body-bg-active');
        body.style.backgroundColor = '#FFF'; // Force white if stopped
      } else {
        body.classList.add('body-bg-active');
      }
    }
  </script>
</body>
</html>
